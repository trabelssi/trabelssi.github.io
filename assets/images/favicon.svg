<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>

  <!-- Corner circuit decorations -->
  <line x1="14" y1="14" x2="14" y2="22" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="22" x2="22" y2="22" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="25" cy="22" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1.5"/>

  <line x1="86" y1="14" x2="86" y2="22" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="22" x2="78" y2="22" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="75" cy="22" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1.5"/>

  <line x1="14" y1="86" x2="14" y2="78" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="78" x2="22" y2="78" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="25" cy="78" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1.5"/>

  <line x1="86" y1="86" x2="86" y2="78" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="78" x2="78" y2="78" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="75" cy="78" r="2.5" fill="none" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Initials -->
  <text
    x="50" y="62"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="38"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1">MA</text>

  <!-- Underline accent -->
  <line x1="28" y1="68" x2="72" y2="68" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
